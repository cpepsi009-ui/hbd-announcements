<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HBD | upcomings</title>
    <link rel="icon" type="image/png" href="icon.png" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        body {
            background: black;
        }
        
        .darkness-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            pointer-events: none;
            animation: fadeOutDarkness 2s ease-out forwards;
        }
        
        @keyframes fadeOutDarkness {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container video {
            max-width: 60%;
            max-height: 60%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            opacity: 0;
            transform: scale(0.7);
            animation: fadeInScale 1.5s ease-out forwards;
        }
        
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(30,30,50,0) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: bgReveal 2s ease-out forwards;
        }
        
        @keyframes bgReveal {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div class="darkness-overlay"></div>
    
    <div class="container" id="videoContainer">
        <div class="error-message">...</div>
    </div>

    <script>
        const container = document.getElementById('videoContainer');
        const video = document.createElement('video');
        
        video.setAttribute('autoplay', '');
        video.setAttribute('loop', '');
        video.setAttribute('playsinline', '');
        video.muted = false;
        video.volume = 1.0;
        
        video.style.opacity = '0';
        video.style.transform = 'scale(0.7)';
        video.style.animation = 'fadeInScale 1.5s ease-out forwards';
        video.style.maxWidth = '60%';
        video.style.maxHeight = '60%';
        video.style.width = 'auto';
        video.style.height = 'auto';
        video.style.objectFit = 'contain';
        
        const videoPaths = ['video.mp4', './video.mp4', 'videos/video.mp4', 'assets/video.mp4'];
        let videoStarted = false;
        
        function startVideo(path) {
            if (videoStarted) return;
            videoStarted = true;
            
            video.src = path;
            video.load();
            
            video.addEventListener('canplay', function() {
                container.innerHTML = '';
                container.appendChild(video);
                
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function() {
                        document.body.addEventListener('click', function playOnClick() {
                            video.play();
                            document.body.removeEventListener('click', playOnClick);
                        }, { once: true });
                    });
                }
            });
        }
        
        for (let i = 0; i < videoPaths.length; i++) {
            fetch(videoPaths[i], { method: 'HEAD' }).then(function(response) {
                if (response.ok && !videoStarted) {
                    startVideo(videoPaths[i]);
                }
            }).catch(function() {});
        }
        
        const iconPaths = ['icon.png', './icon.png', 'images/icon.png', 'assets/icon.png'];
        
        for (let i = 0; i < iconPaths.length; i++) {
            fetch(iconPaths[i], { method: 'HEAD' }).then(function(response) {
                if (response.ok) {
                    document.getElementById('favicon').href = iconPaths[i];
                }
            }).catch(function() {});
        }
    </script>
</body>
</html>
