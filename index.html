<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HBD | upcomings</title>
    <link rel="icon" type="image/png" href="icon.png" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        body {
            background: black;
        }
        
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container img {
            max-width: 60%;
            max-height: 60%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }
        
        .error-message {
            color: white;
            text-align: center;
            font-family: monospace;
            font-size: 20px;
            padding: 20px;
            background: black;
        }
    </style>
</head>
<body>
    <div class="container" id="imageContainer">
        <div class="error-message">...</div>
    </div>

    <script>
        const possiblePaths = [
            'image.png',
            './image.png',
            'images/image.png',
            'img/image.png',
            'assets/image.png',
            '../image.png',
            '../../image.png'
        ];

        const iconPaths = [
            'icon.png',
            './icon.png',
            'images/icon.png',
            'img/icon.png',
            'assets/icon.png',
            '../icon.png',
            '../../icon.png'
        ];

        async function findAndDisplayImage() {
            const container = document.getElementById('imageContainer');
            
            for (const path of possiblePaths) {
                try {
                    const response = await fetch(path, { method: 'HEAD' });
                    if (response.ok) {
                        container.innerHTML = `<img src="${path}" alt="Image">`;
                        return;
                    }
                } catch(e) {}
            }
            
            container.innerHTML = '<div class="error-message">image.png not found</div>';
        }

        async function findAndSetIcon() {
            for (const path of iconPaths) {
                try {
                    const response = await fetch(path, { method: 'HEAD' });
                    if (response.ok) {
                        const favicon = document.getElementById('favicon');
                        favicon.href = path;
                        return;
                    }
                } catch(e) {}
            }
        }

        findAndDisplayImage();
        findAndSetIcon();
    </script>
</body>
</html>
