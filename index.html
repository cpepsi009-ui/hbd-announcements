<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HBD | upcomings</title>
    <link rel="icon" type="image/png" href="icon.png" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        body {
            background: black;
        }
        
        .darkness-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            pointer-events: none;
            animation: fadeOutDarkness 3s ease-out forwards;
        }
        
        @keyframes fadeOutDarkness {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container video {
            max-width: 60%;
            max-height: 60%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 2s ease-out;
        }
        
        .container video.loaded {
            opacity: 1;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(30,30,50,0) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: bgReveal 3s ease-out forwards;
        }
        
        @keyframes bgReveal {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 0.4;
            }
        }
        
        .loading {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-family: monospace;
            font-size: 12px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="darkness-overlay"></div>
    <div class="container" id="videoContainer">
        <div class="loading">loading...</div>
    </div>

    <script>
        const container = document.getElementById('videoContainer');
        const video = document.createElement('video');
        video.loop = true;
        video.muted = true;
        video.volume = 1.0;
        video.playsInline = true;
        video.style.maxWidth = '60%';
        video.style.maxHeight = '60%';
        video.style.width = 'auto';
        video.style.height = 'auto';
        video.style.objectFit = 'contain';
        
        const paths = ['video.mp4', './video.mp4', 'videos/video.mp4', 'assets/video.mp4'];
        let videoFound = false;
        
        function loadVideo(url) {
            videoFound = true;
            video.src = url;
            
            video.addEventListener('canplaythrough', function() {
                container.innerHTML = '';
                container.appendChild(video);
                video.classList.add('loaded');
                video.play();
                
                setTimeout(function() {
                    video.muted = false;
                }, 100);
            });
            
            video.load();
        }
        
        for (let i = 0; i < paths.length; i++) {
            fetch(paths[i], { method: 'HEAD' }).then(function(r) {
                if (r.ok && !videoFound) {
                    loadVideo(paths[i]);
                }
            }).catch(function() {});
        }
        
        setTimeout(function() {
            if (!videoFound) {
                container.innerHTML = '';
            }
        }, 3000);
        
        const iconPaths = ['icon.png', './icon.png', 'images/icon.png', 'img/icon.png', 'assets/icon.png'];
        const favicon = document.getElementById('favicon');
        
        for (let i = 0; i < iconPaths.length; i++) {
            fetch(iconPaths[i], { method: 'HEAD' }).then(function(r) {
                if (r.ok) {
                    favicon.href = iconPaths[i];
                }
            }).catch(function() {});
        }
    </script>
</body>
</html>
