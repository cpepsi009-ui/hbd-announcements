<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        img{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;}
    </style>
</head>
<body>
    <img id="img">
    <script>
        fetch(location.pathname).then(r=>r.text()).then(h=>{
            let m=[...h.matchAll(/href="([^"]+\.jpg)"/gi)].map(x=>x[1]);
            if(m[0]) document.getElementById('img').src=m[0];
        });
    </script>
</body>
</html>
